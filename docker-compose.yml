version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: lms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: lms_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lms_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: password
    ports:
      - '8080:80'
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql_data:
